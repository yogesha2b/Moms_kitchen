<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom Care Home Made Food — Order Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF2E3;
    --panel: #FFFFFF;
    --panel-warm: #FFF9EE;
    --ink: #2E1B12;
    --ink-soft: #5A4433;
    --muted: #97815F;
    --accent: #C1442E;
    --accent-deep: #8F2E1D;
    --gold: #E8A93A;
    --line: #EEDCC0;
    --whatsapp: #25D366;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{ scroll-behavior:smooth; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Work Sans', sans-serif;
    min-height:100vh;
    padding: 0 0 130px 0;
    overflow-x:hidden;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  /* ---------- ambient floating background ---------- */
  .ambient{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .blob{
    position:absolute;
    border-radius:50%;
    filter: blur(40px);
    opacity:0.35;
    animation: drift 16s ease-in-out infinite;
  }
  .blob.b1{ width:220px; height:220px; background: var(--gold); top:-60px; left:-60px; animation-delay:0s; }
  .blob.b2{ width:260px; height:260px; background: var(--accent); top:20%; right:-100px; animation-delay:-5s; }
  .blob.b3{ width:180px; height:180px; background: #8FA872; bottom:120px; left:-70px; animation-delay:-10s; }
  @keyframes drift{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(20px,-24px) scale(1.08); }
  }

  @keyframes fadeSlideDown{
    from{ opacity:0; transform: translateY(-18px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes fadeSlideUp{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes popIn{
    from{ opacity:0; transform: scale(0.85); }
    to{ opacity:1; transform: scale(1); }
  }
  @keyframes floatY{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-8px) rotate(1.2deg); }
  }
  @keyframes shine{
    0%{ background-position: -150% 0; }
    100%{ background-position: 250% 0; }
  }

  /* ---------- header ---------- */
  header{
    padding: 28px 20px 26px;
    text-align:center;
    position:relative;
    background:
      radial-gradient(circle at 50% -10%, rgba(193,68,46,0.10), transparent 55%),
      var(--bg);
    border-bottom: 3px solid var(--accent);
    z-index:1;
  }
  .corner{
    position:absolute;
    width: 34px; height:34px;
    color: var(--accent);
    opacity: 0.7;
  }
  .corner.tl{top:10px; left:12px;}
  .corner.tr{top:10px; right:12px; transform: scaleX(-1);}

  .student-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background: var(--accent);
    color:#FFF6EA;
    font-size:11px;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:14px;
    animation: fadeSlideDown 0.6s ease both, floatY 5s ease-in-out 0.6s infinite;
  }

  .badge-wrap{
    perspective: 700px;
    width: 132px;
    margin: 4px auto 8px;
  }
  .badge{
    width: 132px;
    display:block;
    margin: 0 auto;
    filter: drop-shadow(0 10px 18px rgba(143,46,29,0.25));
    animation: fadeSlideDown 0.7s ease both, floatY 6s ease-in-out 0.7s infinite;
    transition: transform 0.4s ease;
    transform-style: preserve-3d;
  }
  .badge-wrap:hover .badge{
    transform: rotateY(14deg) rotateX(6deg) scale(1.04);
  }

  .brand-name{
    font-family:'Fraunces', serif;
    font-weight:800;
    font-size: clamp(30px, 8vw, 42px);
    letter-spacing: 1px;
    color: var(--ink);
    line-height:1;
    animation: fadeSlideDown 0.7s ease 0.05s both;
  }
  .brand-sub{
    margin-top: 8px;
    font-size:13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight:700;
    animation: fadeSlideDown 0.7s ease 0.12s both;
  }
  .brand-sub .heart{ opacity:0.8; display:inline-block; animation: floatY 2.4s ease-in-out infinite; }
  .tagline{
    color: var(--ink-soft);
    margin-top:12px;
    font-size:14.5px;
    max-width: 400px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.5;
    animation: fadeSlideDown 0.7s ease 0.18s both;
  }

  /* ---------- min order note ---------- */
  .min-note{
    max-width: 640px;
    margin: 14px auto 0;
    padding: 0 16px;
    position:relative;
    z-index:1;
  }
  .min-note-inner{
    background: var(--panel-warm);
    border: 1px dashed var(--gold);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--ink-soft);
    text-align:center;
    font-weight:600;
    animation: fadeSlideUp 0.6s ease 0.2s both;
  }
  .min-note-inner b{ color: var(--accent-deep); }

  /* ---------- tabs ---------- */
  .tabs{
    max-width: 640px;
    margin: 0 auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding: 18px 16px 4px;
    position:relative;
    z-index:1;
  }
  .tab{
    display:flex;
    align-items:center;
    gap:7px;
    padding: 10px 16px;
    border-radius: 999px;
    background: var(--panel);
    color: var(--ink-soft);
    font-size:13.5px;
    font-weight:700;
    border: 1.5px solid var(--line);
    cursor:pointer;
    white-space:nowrap;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    opacity:0;
    animation: popIn 0.45s ease both;
  }
  .tab svg{ width:16px; height:16px; flex:0 0 auto; }
  .tab:hover{ transform: translateY(-2px); box-shadow: 0 4px 10px rgba(46,27,18,0.12); }
  .tab.active{
    background: var(--accent);
    color: #FFF6EA;
    border-color: var(--accent-deep);
    box-shadow: 0 3px 0 var(--accent-deep);
    transform: translateY(-1px);
  }
  .tab.active:hover{ transform: translateY(-2px); }
  .tab.active svg{ filter: brightness(0) invert(1); opacity:0.95; }

  main{
    max-width: 640px;
    margin: 0 auto;
    padding: 14px 16px 40px;
    position:relative;
    z-index:1;
  }
  .category-block{
    margin-top: 30px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px 18px 6px;
    transform-style: preserve-3d;
    transform: perspective(900px) rotateX(0deg) rotateY(0deg);
    transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
    opacity:0;
    will-change: transform;
  }
  .category-block.revealed{
    animation: fadeSlideUp 0.6s ease both;
  }
  .category-block:hover{
    box-shadow: 0 18px 32px rgba(46,27,18,0.12);
  }
  .category-title{
    font-family:'Fraunces', serif;
    font-size: 21px;
    font-weight:700;
    margin-bottom: 2px;
    color: var(--accent-deep);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .category-title svg{ width:20px; height:20px; }
  .category-sub{
    color: var(--muted);
    font-size:12.5px;
    margin: 4px 0 12px;
  }
  .item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    padding: 15px 0;
    border-bottom: 1px solid var(--line);
    transition: background 0.3s ease;
  }
  .item:last-child{ border-bottom:none; }
  .item.just-added{ animation: itemFlash 0.6s ease; }
  @keyframes itemFlash{
    0%{ background: rgba(232,169,58,0.35); }
    100%{ background: transparent; }
  }
  .item-info{flex:1;}
  .item-name{
    font-weight:700;
    font-size:15.5px;
    color: var(--ink);
  }
  .item-desc{
    color:var(--muted);
    font-size:12.5px;
    margin-top:3px;
    line-height:1.4;
  }
  .item-price-row{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-top:6px;
  }
  .item-price{
    color: var(--accent-deep);
    font-weight:700;
    font-size:14px;
  }
  .item-min{
    color: var(--muted);
    font-size:10.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.4px;
  }

  .qty-control{
    display:flex;
    align-items:center;
    gap:0;
    background: var(--panel-warm);
    border-radius: 10px;
    border: 1.5px solid var(--gold);
    overflow:hidden;
    animation: popIn 0.25s ease;
  }
  .qty-btn{
    width:32px;
    height:34px;
    background:none;
    border:none;
    color: var(--accent-deep);
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.15s ease;
  }
  .qty-btn:hover{ background: rgba(232,169,58,0.18); }
  .qty-btn:active{ background: rgba(193,68,46,0.14); transform: scale(0.92); }
  .qty-num{
    min-width: 22px;
    text-align:center;
    font-weight:700;
    font-size:14.5px;
    color: var(--ink);
    display:inline-block;
  }
  .qty-num.bump{ animation: popIn 0.25s ease; }
  .add-btn{
    padding: 9px 16px;
    background: var(--accent);
    color: #FFF6EA;
    border:none;
    border-radius: 10px;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    box-shadow: 0 3px 0 var(--accent-deep);
    white-space:nowrap;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .add-btn:hover{ transform: translateY(-1px); }
  .add-btn:active{
    box-shadow: 0 1px 0 var(--accent-deep);
    transform: translateY(2px);
  }

  /* ---------- tray ---------- */
  .tray{
    position: fixed;
    bottom: 0;
    left:0; right:0;
    background: var(--panel);
    border-top: 3px solid var(--accent);
    box-shadow: 0 -8px 24px rgba(46,27,18,0.15);
    padding: 14px 18px;
    display:none;
    z-index: 50;
  }
  .tray.visible{ display:block; animation: fadeSlideUp 0.35s ease; }
  .tray-summary{
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width: 640px;
    margin: 0 auto 10px;
  }
  .tray-count{
    font-size:13px;
    color: var(--muted);
    font-weight:600;
  }
  .tray-total{
    font-family:'Fraunces', serif;
    font-size:20px;
    font-weight:700;
    color: var(--accent-deep);
  }
  .tray-total.bump{ animation: popIn 0.3s ease; }
  .tray-cta{
    max-width:640px;
    margin: 0 auto;
    display:flex;
    gap:10px;
  }
  .btn-view{
    flex:1;
    padding: 13px;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent-deep);
    border-radius: 10px;
    font-weight:700;
    cursor:pointer;
    transition: transform 0.15s ease;
  }
  .btn-view:hover{ transform: translateY(-1px); }
  .btn-order{
    flex:2;
    padding: 13px;
    background: var(--accent);
    color: #FFF6EA;
    border:none;
    border-radius: 10px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow: 0 3px 0 var(--accent-deep);
    transition: transform 0.15s ease;
  }
  .btn-order:hover{ transform: translateY(-1px); }

  /* ---------- sheet ---------- */
  .overlay{
    position:fixed; inset:0;
    background: rgba(46,27,18,0.55);
    display:none;
    align-items:flex-end;
    z-index: 100;
  }
  .overlay.visible{ display:flex; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
  .sheet{
    background: var(--panel);
    width:100%;
    max-width: 640px;
    margin: 0 auto;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 28px;
    max-height: 85vh;
    overflow-y:auto;
    border-top: 4px solid var(--accent);
    transform-origin: bottom center;
    animation: sheetIn 0.35s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes sheetIn{
    from{ opacity:0; transform: translateY(40px) rotateX(6deg); }
    to{ opacity:1; transform: translateY(0) rotateX(0deg); }
  }
  .sheet-title{
    font-family:'Fraunces', serif;
    font-size: 22px;
    font-weight:700;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .sheet-min-note{
    font-size:12px;
    color: var(--muted);
    margin-bottom:14px;
  }
  .sheet-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-size:14px;
    gap:8px;
  }
  .sheet-row .name{font-weight:700; color:var(--ink);}
  .sheet-row .remove{
    color: var(--muted);
    background:none;
    border:none;
    font-size: 12.5px;
    text-decoration: underline;
    cursor:pointer;
    flex:0 0 auto;
  }
  .sheet-total{
    display:flex;
    justify-content:space-between;
    padding-top: 14px;
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 18px;
    color: var(--accent-deep);
  }
  .field{
    margin-top: 16px;
  }
  .field label{
    display:block;
    font-size:11.5px;
    color: var(--muted);
    margin-bottom:6px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight:700;
  }
  .field input, .field textarea{
    width:100%;
    padding: 11px 12px;
    background: var(--panel-warm);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .field input:focus, .field textarea:focus{
    outline:none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(193,68,46,0.12);
  }
  .field textarea{resize: vertical; min-height: 50px;}
  .send-btn{
    width:100%;
    margin-top:20px;
    padding: 15px;
    background: var(--whatsapp);
    color: #06210F;
    border:none;
    border-radius: 10px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition: transform 0.15s ease;
  }
  .send-btn:hover{ transform: translateY(-1px); }
  .send-btn:active{ transform: translateY(1px); }
  .close-sheet{
    display:block;
    margin: 0 auto;
    background:none;
    border:none;
    color: var(--muted);
    font-size: 13px;
    margin-top:14px;
    cursor:pointer;
    text-decoration: underline;
  }
  .empty-note{
    color: var(--muted);
    font-size: 14px;
    text-align:center;
    padding: 20px 0;
  }
  .load-note{
    color: var(--muted);
    text-align:center;
    padding: 40px 0;
  }

  /* ---------- contact footer ---------- */
  footer{
    max-width:640px;
    margin: 30px auto 0;
    padding: 0 16px;
    position:relative;
    z-index:1;
    text-align:center;
  }
  .contact-card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 18px 24px;
  }
  .contact-eyebrow{
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color: var(--accent-deep);
    font-weight:700;
    margin-bottom:12px;
  }
  .contact-buttons{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .contact-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background: var(--accent);
    color:#FFF6EA;
    text-decoration:none;
    font-weight:700;
    font-size:14.5px;
    padding: 13px;
    border-radius: 10px;
    box-shadow: 0 3px 0 var(--accent-deep);
    transition: transform 0.15s ease;
  }
  .contact-btn:hover{ transform: translateY(-1px); }
  .contact-btn:active{ transform: translateY(2px); box-shadow: 0 1px 0 var(--accent-deep); }
  .contact-btn svg{ width:18px; height:18px; flex:0 0 auto; }
  .contact-note{
    margin-top:14px;
    font-size:12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="ambient">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<header>
  <svg class="corner tl" viewBox="0 0 40 40" fill="none"><path d="M2 2 V20 M2 2 H20" stroke="currentColor" stroke-width="2"/><path d="M8 2 Q2 2 2 8" stroke="currentColor" stroke-width="1.4"/></svg>
  <svg class="corner tr" viewBox="0 0 40 40" fill="none"><path d="M2 2 V20 M2 2 H20" stroke="currentColor" stroke-width="2"/><path d="M8 2 Q2 2 2 8" stroke="currentColor" stroke-width="1.4"/></svg>

  <div class="student-pill">🎓 Loved by college hostellers</div>

  <div class="badge-wrap">
    <img class="badge" src="mom-care-logo.png" alt="Mom Care Home Made Food logo">
  </div>

  <div class="brand-name" id="kitchenName">Loading…</div>
  <div class="brand-sub"><span class="heart">♥</span> Home Made Food <span class="heart">♥</span></div>
  <p class="tagline" id="kitchenTagline"></p>
</header>

<div class="min-note">
  <div class="min-note-inner">Please order a <b>minimum of 3</b> per item.</div>
</div>

<div class="tabs" id="tabs"></div>
<main id="menuContainer"><p class="load-note">Loading menu…</p></main>

<footer id="footer"></footer>

<div class="tray" id="tray">
  <div class="tray-summary">
    <span class="tray-count" id="trayCount">0 items</span>
    <span class="tray-total" id="trayTotal">₹0</span>
  </div>
  <div class="tray-cta">
    <button class="btn-view" onclick="openSheet()">View order</button>
    <button class="btn-order" onclick="openSheet()">Review &amp; send →</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this) closeSheet()">
  <div class="sheet">
    <div class="sheet-title">Your order</div>
    <div class="sheet-min-note">Minimum 3 of each item · edit quantities below</div>
    <div id="sheetItems"></div>
    <div class="sheet-total"><span>Total</span><span id="sheetTotal">₹0</span></div>

    <div class="field">
      <label>Your name</label>
      <input type="text" id="custName" placeholder="e.g. Sree varsha">
    </div>
    <div class="field">
      <label>Your phone number</label>
      <input type="tel" id="custPhone" placeholder="e.g. 98765 43210" inputmode="tel">
    </div>
    <div class="field">
      <label>Delivery address</label>
      <textarea id="custAddress" placeholder="Hostel / PG / room no. / landmark"></textarea>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="custNotes" placeholder="Less spicy, no onion, etc.">
    </div>

    <button class="send-btn" onclick="sendOrder()">
      Send order on WhatsApp
    </button>
    <button class="close-sheet" onclick="closeSheet()">Keep browsing menu</button>
  </div>
</div>

<script>
/* =========================================================
   MENU DATA lives in menu.json (same folder as this file).
   Edit menu.json to change the menu — this file never needs
   to change for menu updates.
   ========================================================= */

const MIN_QTY = 3;
let CONFIG = null;
let cart = {}; // key: "categoryId|itemName" -> {name, price, qty}

const tabsEl = document.getElementById('tabs');
const menuEl = document.getElementById('menuContainer');
const footerEl = document.getElementById('footer');

// icon set, matched to poster's tab icons, keyed by category id with a text fallback
const ICONS = {
  lunch: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7 2v7a2 2 0 0 0 4 0V2M7 2v20M7 9H5M11 2v20"/><path d="M17 2c-1.5 2-2 4-2 6 0 3 1 4 2 4v10"/></svg>`,
  gravy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h14a4 4 0 0 1 0 8H8a5 5 0 0 1-5-5v-3z"/><path d="M17 12h3a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2h-1"/><path d="M6 6c0-1.5 1-3 2-3M10 6c0-1.5.7-2.5 1.4-3"/></svg>`,
  night: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2a9 9 0 1 0 8 13 7.5 7.5 0 0 1-8-13z"/><circle cx="19" cy="5" r="1"/><circle cx="21" cy="9" r="0.7"/></svg>`,
  starters: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14c0-5 4-9 9-9s9 4 9 9"/><path d="M2 14h20"/><path d="M12 3v2"/></svg>`,
  'sunday-special': `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.6L22 9.3l-5 4.9 1.2 7L12 17.8 5.8 21.2 7 14.2 2 9.3l7.1-.7L12 2z"/></svg>`,
  milkshake: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 8h10l-1.2 12a2 2 0 0 1-2 1.8h-3.6a2 2 0 0 1-2-1.8L7 8z"/><path d="M6 8h12l.6-3H5.4L6 8z"/><path d="M15 5V3M17 8v10"/></svg>`
};
const DEFAULT_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>`;
const WA_ICON = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15L2 22l5.2-1.4A10 10 0 1 0 12 2zm0 18.2a8.2 8.2 0 0 1-4.2-1.15l-.3-.18-3.1.83.83-3-.2-.32A8.2 8.2 0 1 1 12 20.2zm4.5-6.15c-.25-.13-1.45-.72-1.68-.8-.22-.08-.38-.13-.55.13-.16.25-.63.8-.77.97-.14.16-.28.18-.53.06-.25-.13-1.04-.38-1.98-1.22-.73-.65-1.23-1.46-1.37-1.7-.14-.25-.02-.38.11-.5.11-.11.25-.28.37-.42.13-.14.16-.24.25-.4.08-.16.04-.3-.02-.42-.06-.13-.55-1.32-.75-1.8-.2-.48-.4-.4-.55-.4h-.47c-.16 0-.42.06-.64.3-.22.25-.85.83-.85 2.03s.87 2.36.99 2.52c.13.16 1.7 2.6 4.13 3.64.58.25 1.03.4 1.38.5.58.19 1.11.16 1.53.1.47-.07 1.45-.6 1.65-1.17.2-.58.2-1.07.14-1.17-.06-.1-.22-.16-.47-.28z"/></svg>`;
const CALL_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.13.9.35 1.8.66 2.6a2 2 0 0 1-.45 2.1L8.1 9.6a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.45c.85.31 1.72.53 2.6.66A2 2 0 0 1 22 16.9z"/></svg>`;

async function loadMenu(){
  try{
    // cache-bust so edits to menu.json show up immediately after a deploy
    const res = await fetch('menu.json?v=' + Date.now());
    if(!res.ok) throw new Error('menu.json not found (HTTP ' + res.status + ')');
    CONFIG = await res.json();
  }catch(err){
    menuEl.innerHTML = '<p class="load-note">Could not load menu.json — make sure it is in the same folder as this page and you are viewing it over http(s), not as a local file:// path.</p>';
    console.error(err);
    return;
  }
  document.getElementById('kitchenName').textContent = CONFIG.kitchenName;
  document.getElementById('kitchenTagline').textContent = CONFIG.tagline;
  renderTabs();
  renderMenu();
  renderFooter();
  setupCardTilt();
  setupScrollReveal();
}

function iconFor(id){ return ICONS[id] || DEFAULT_ICON; }

function renderTabs(){
  tabsEl.innerHTML = CONFIG.categories.map((c,i) =>
    `<button class="tab ${i===0?'active':''}" style="animation-delay:${0.05*i}s" data-cat="${c.id}" onclick="scrollToCat('${c.id}', this)">${iconFor(c.id)}<span>${c.title}</span></button>`
  ).join('');
}

function scrollToCat(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('block-'+id).scrollIntoView({behavior:'smooth', block:'start'});
}

function renderMenu(){
  menuEl.innerHTML = CONFIG.categories.map(cat => `
    <div class="category-block" id="block-${cat.id}">
      <div class="category-title">${iconFor(cat.id)}<span>${cat.title}</span></div>
      ${cat.sub ? `<div class="category-sub">${cat.sub}</div>` : ''}
      ${cat.items.map(item => {
        const key = cat.id + '|' + item.name;
        return `
        <div class="item" id="item-${cssKey(key)}">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
            <div class="item-price-row">
              <span class="item-price">₹${item.price}</span>
              <span class="item-min">Min 3</span>
            </div>
          </div>
          <div id="ctrl-${cssKey(key)}">${controlHTML(key, item)}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function renderFooter(){
  const nums = (CONFIG.callNumbers && CONFIG.callNumbers.length)
    ? CONFIG.callNumbers
    : [{ label: 'Order / WhatsApp', number: CONFIG.whatsappNumber.replace(/^91/, '') }];

  footerEl.innerHTML = `
    <div class="contact-card">
      <div class="contact-eyebrow">Call / WhatsApp to order</div>
      <div class="contact-buttons">
        ${nums.map(n => `
          <a class="contact-btn" href="https://wa.me/91${n.number}" target="_blank" rel="noopener">
            ${WA_ICON}
            <span>${n.label} — ${n.number}</span>
          </a>
        `).join('')}
      </div>
      <div class="contact-note">Tap a number to WhatsApp us directly, or use "Review &amp; send" above.</div>
    </div>
  `;
}

function cssKey(key){ return key.replace(/[^a-zA-Z0-9]/g,'_'); }

function controlHTML(key, item){
  const qty = cart[key] ? cart[key].qty : 0;
  const safeKey = key.replace(/'/g,"\\'");
  const safeName = item.name.replace(/'/g,"\\'");
  if(qty === 0){
    return `<button class="add-btn" onclick="addItem('${safeKey}', '${safeName}', ${item.price})">Add · min 3</button>`;
  }
  return `
    <div class="qty-control">
      <button class="qty-btn" onclick="minusClick('${safeKey}', '${safeName}', ${item.price})" aria-label="${qty===MIN_QTY?'Remove':'Decrease'}">${qty===MIN_QTY ? '✕' : '−'}</button>
      <span class="qty-num">${qty}</span>
      <button class="qty-btn" onclick="changeQty('${safeKey}', '${safeName}', ${item.price}, 1)" aria-label="Increase">+</button>
    </div>`;
}

function addItem(key, name, price){
  cart[key] = { name, price, qty: MIN_QTY };
  refreshItem(key);
  refreshTray();
  flashItem(key);
}

function changeQty(key, name, price, delta){
  if(!cart[key]) cart[key] = { name, price, qty: MIN_QTY };
  cart[key].qty += delta;
  if(cart[key].qty < MIN_QTY) cart[key].qty = MIN_QTY;
  refreshItem(key);
  refreshTray();
}

function minusClick(key, name, price){
  if(cart[key] && cart[key].qty <= MIN_QTY){
    removeItem(key);
  }else{
    changeQty(key, name, price, -1);
  }
}

function removeItem(key){
  delete cart[key];
  refreshItem(key);
  refreshTray();
  refreshSheetIfOpen();
}

function refreshItem(key){
  const el = document.getElementById('ctrl-' + cssKey(key));
  if(!el) return;
  const [, name] = key.split('|');
  const price = cart[key] ? cart[key].price : (findItemPrice(key));
  el.innerHTML = controlHTML(key, { name, price });
}

function flashItem(key){
  const row = document.getElementById('item-' + cssKey(key));
  if(!row) return;
  row.classList.remove('just-added');
  void row.offsetWidth; // restart animation
  row.classList.add('just-added');
}

function findItemPrice(key){
  const [catId, name] = key.split('|');
  const cat = CONFIG.categories.find(c => c.id === catId);
  const item = cat.items.find(i => i.name === name);
  return item ? item.price : 0;
}

function cartArray(){ return Object.entries(cart).map(([key, v]) => ({ key, ...v })); }
function cartTotal(){ return cartArray().reduce((sum,i)=>sum + i.price*i.qty, 0); }
function cartCount(){ return cartArray().reduce((sum,i)=>sum + i.qty, 0); }

function refreshTray(){
  const tray = document.getElementById('tray');
  const count = cartCount();
  if(count === 0){
    tray.classList.remove('visible');
    return;
  }
  tray.classList.add('visible');
  document.getElementById('trayCount').textContent = count + (count===1 ? ' item' : ' items');
  const totalEl = document.getElementById('trayTotal');
  totalEl.textContent = '₹' + cartTotal();
  totalEl.classList.remove('bump');
  void totalEl.offsetWidth;
  totalEl.classList.add('bump');
}

function refreshSheetIfOpen(){
  if(document.getElementById('overlay').classList.contains('visible')){
    if(cartCount() === 0){ closeSheet(); return; }
    openSheet();
  }
}

function openSheet(){
  if(cartCount() === 0) return;
  const itemsEl = document.getElementById('sheetItems');
  itemsEl.innerHTML = cartArray().map(i => `
    <div class="sheet-row">
      <span class="name">${i.name} × ${i.qty}</span>
      <span>₹${i.price*i.qty}</span>
      <button class="remove" onclick="removeItem('${i.key.replace(/'/g,"\\'")}')">Remove</button>
    </div>
  `).join('');
  document.getElementById('sheetTotal').textContent = '₹' + cartTotal();
  document.getElementById('overlay').classList.add('visible');
}

function closeSheet(){
  document.getElementById('overlay').classList.remove('visible');
}

function sendOrder(){
  if(cartCount() === 0) return;
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const address = document.getElementById('custAddress').value.trim();
  const notes = document.getElementById('custNotes').value.trim();

  let msg = `Hi ${CONFIG.kitchenName}! I'd like to place an order:\n\n`;
  cartArray().forEach(i => {
    msg += `• ${i.name} × ${i.qty} — ₹${i.price*i.qty}\n`;
  });
  msg += `\nTotal: ₹${cartTotal()}\n`;
  if(name) msg += `\nName: ${name}`;
  if(phone) msg += `\nPhone: ${phone}`;
  if(address) msg += `\nAddress: ${address}`;
  if(notes) msg += `\nNotes: ${notes}`;

  const url = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

/* ---------- 3D tilt on category cards (desktop pointer only) ---------- */
function setupCardTilt(){
  if(window.matchMedia('(pointer: coarse)').matches) return; // skip on touch devices
  document.querySelectorAll('.category-block').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform = `perspective(900px) rotateX(${(-y*4).toFixed(2)}deg) rotateY(${(x*4).toFixed(2)}deg)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
    });
  });
}

/* ---------- scroll reveal for category cards ---------- */
function setupScrollReveal(){
  const blocks = document.querySelectorAll('.category-block');
  if(!('IntersectionObserver' in window)){
    blocks.forEach(b => { b.style.opacity = 1; });
    return;
  }
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.style.opacity = 1;
        entry.target.classList.add('revealed');
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });
  blocks.forEach(b => io.observe(b));
}

loadMenu();
</script>
